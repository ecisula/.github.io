---
# =====================================================================
# КОНФІГУРАЦІЯ ЗАВДАНЬ — GYLKA Business AI System
# =====================================================================

daily_market_research:
  description: >
    Проведи щоденний аналіз ринку для бізнесу {business_name}
    у категорії {category}.

    1. Проаналізуй топ-10 конкурентів за ціною та рейтингом.
    2. Знайди SKU, де є цінова перевага (наші ціни кращі).
    3. Виміряй попит (якщо є дані): які товари зараз зростають.
    4. Виведи список з 5 найкращих можливостей на сьогодні.

    Бюджет на місяць: {monthly_budget} грн.
    Кількість активних SKU: {sku_count}.
  expected_output: >
    Структурований звіт (markdown) з розділами:
    - Топ конкуренти та їх слабкі місця
    - SKU з найвищим потенціалом на сьогодні
    - Рекомендовані дії (пронумерований список, макс. 5 пунктів)
  agent: market_researcher

content_optimization:
  description: >
    Оптимізуй контент для топ-5 SKU, які були визначені аналізом ринку.

    Для кожного SKU:
    1. Запропонуй SEO-назву (до 150 символів, ключові слова на початку).
    2. Напиши короткий опис (150–250 слів): вигода → характеристики →
       гарантія → доставка.
    3. Перевір, чи всі обов'язкові атрибути заповнені.
    4. Дай рекомендації щодо головного фото.

    Мова контенту: українська.
    Маркетплейси: Rozetka, Prom, EpicentrK.
  expected_output: >
    Для кожного SKU — блок markdown з:
    - Оптимізована назва
    - Готовий опис для копіювання
    - Список атрибутів для перевірки
    - Коментар до фото
  agent: content_creator
  context:
    - daily_market_research

pricing_strategy:
  description: >
    Розроби стратегію ціноутворення на основі даних ринкового аналізу.

    1. Визнач "локомотивні" SKU (до 10% нижче середнього по ринку).
    2. Для решти SKU — ціни з маржею мінімум {min_margin}%.
    3. Запропонуй 2–3 bundle-комплекти для підняття середнього чеку.
    4. Встанови тригери для авто-зміни цін (коли підіймати, коли знижувати).

    Поточна середня маржа: {current_margin}%.
    Мінімально допустима маржа: {min_margin}%.
  expected_output: >
    Таблиця (markdown) з колонками:
    SKU | Поточна ціна | Рекомендована ціна | Зміна% | Маржа% | Статус (локомотив/стандарт/тест)

    Плюс секція: рекомендовані bundle та тригери ціноутворення.
  agent: pricing_analyst
  context:
    - daily_market_research

advertising_plan:
  description: >
    Склади план рекламних кампаній на поточний тиждень.

    1. Визнач SKU для реклами: топ за конверсією + новинки.
    2. Розподіли бюджет: 60% на перевірені SKU, 25% на новинки, 15% на ретест.
    3. Встанови ставки та KPI для кожної групи.
    4. Вкажи умови для відключення збиткових оголошень.

    Тижневий рекламний бюджет: {weekly_ad_budget} грн.
    Цільовий ROAS: {target_roas}x.
  expected_output: >
    План кампаній у форматі markdown:
    - Список кампаній з SKU, бюджетом, очікуваним ROAS
    - Правила оптимізації (коли зупиняти/масштабувати)
    - Розклад перегляду результатів
  agent: advertising_manager
  context:
    - daily_market_research
    - pricing_strategy

customer_feedback_analysis:
  description: >
    Проаналізуй стан репутації магазину та розроби план поліпшення.

    1. Оціни поточний рейтинг і динаміку відгуків.
    2. Виявіть топ-3 причини негативних відгуків.
    3. Запропонуй шаблони відповідей на негатив (SLA 24 год).
    4. Склади план збору нових відгуків (post-purchase flow).

    Цільовий рейтинг: мінімум 4.7/5.0.
  expected_output: >
    Звіт з розділами:
    - Поточний стан репутації
    - Аналіз негативу (причини + частота)
    - Готові шаблони відповідей (3–5 варіантів)
    - Покрокова інструкція для збору відгуків
  agent: customer_relations_manager

weekly_analytics_report:
  description: >
    Підготуй тижневий аналітичний звіт для бізнесу {business_name}.

    Зведи дані від всіх агентів та сформуй:
    1. KPI Dashboard: покази, CTR, конверсія, ROAS, оборот, маржа.
    2. Що спрацювало цього тижня (топ-3 досягнення).
    3. Що не спрацювало та чому.
    4. Пріоритети на наступний тиждень (топ-5 дій).
    5. Прогноз обороту на наступний місяць.
  expected_output: >
    Структурований тижневий звіт (markdown) з усіма секціями.
    Формат: виконавчий саммері (5–7 речень) + детальні розділи.
  agent: business_strategist
  context:
    - daily_market_research
    - content_optimization
    - pricing_strategy
    - advertising_plan
    - customer_feedback_analysis
